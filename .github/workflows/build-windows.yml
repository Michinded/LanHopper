name: Build Windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: powershell
        run: |
          # uvloop is Unix-only, exclude it on Windows
          Get-Content requirements.txt | Where-Object { $_ -notmatch '^uvloop' } | Set-Content requirements-win.txt
          pip install -r requirements-win.txt

      - name: Enable Developer Mode
        shell: powershell
        run: |
          $regPath = "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\AppModelUnlock"
          if (-not (Test-Path $regPath)) { New-Item -Path $regPath -Force | Out-Null }
          Set-ItemProperty -Path $regPath -Name "AllowDevelopmentWithoutDevLicense" -Value 1

      - name: Build Windows app
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: flet build windows --no-rich-output --yes

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LanHopper-windows
          path: build/windows/
          retention-days: 30
